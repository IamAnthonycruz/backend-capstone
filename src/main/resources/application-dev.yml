# Local development profile.
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.readshelf: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# In dev, surface full health details for convenience.
management:
  endpoint:
    health:
      show-details: always